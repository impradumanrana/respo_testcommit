name: TRIAVANI Commit Score

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  score-commit:
    runs-on: self-hosted

    env:
      TRIAVANI_API_URL: ${{ vars.TRIAVANI_API_URL || 'http://localhost:8000' }}

    steps:
      - name: Check TRIAVANI API
        run: |
          curl -fsS "$TRIAVANI_API_URL/health"

      - name: Score pushed commit with TRIAVANI
        run: |
          curl -fsS -X POST "$TRIAVANI_API_URL/api/commit-scores/score" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "${{ github.repository }}",
              "repo_url": "${{ github.server_url }}/${{ github.repository }}.git",
              "branch": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}",
              "commit_sha": "${{ github.sha }}",
              "use_mock": false
            }'

            